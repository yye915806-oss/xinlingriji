<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心灵日记</title>
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<style>
body{
    font-family: Arial, sans-serif;
    background:#f3fff2;
    margin:0;
    padding:20px;
}

.container{
    max-width:600px;
    margin:auto;
}

.card{
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#2e7d32;
}

h2{
    color:#388e3c;
}

textarea,input,select{
    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:12px;
    border-radius:10px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#4caf50;
    color:white;
    font-size:16px;
}

button:hover{
    background:#43a047;
}
</style>
</head>

<body>

<div class="container">

<h1>🌱 心灵日记</h1>

<div class="card">
<h2>今日状态</h2>

<label>专注程度：</label>
<select id="focus">
<option>浮躁</option>
<option>一般</option>
<option>专注</option>
</select>

<label>任务完成度：</label>
<select id="task">
<option>低于50%</option>
<option>60%~80%</option>
<option>完成</option>
</select>

<label>精神状态：</label>
<select id="energy">
<option>疲惫</option>
<option>还行</option>
<option>有劲</option>
</select>
</div>


<div class="card">
<h2>😊 今日心情</h2>

<select id="mood">
<option>😄 开心</option>
<option>🙂 满足</option>
<option>😌 平静</option>
<option>😟 焦虑</option>
<option>😢 难过</option>
<option>😴 疲惫</option>
</select>

</div>


<div class="card">
<h2>📝 每日反思</h2>

<label>今天做得好的地方：</label>
<textarea id="good"></textarea>

<label>今天需要改进的地方：</label>
<textarea id="improve"></textarea>

<label>今天最真实的想法：</label>
<textarea id="thought"></textarea>

<label>给自己一句鼓励：</label>
<input id="encourage">

</div>


<div class="card">
<h2>🎵 今日音乐</h2>

<label>歌曲名称：</label>
<input id="song">

<label>歌手：</label>
<input id="artist">

<label>推荐理由：</label>
<textarea id="reason"></textarea>

</div>


<button onclick="saveDiary()">🌱 保存今天</button>

</div>

<script>

function saveDiary(){

const diary = {
date: new Date().toLocaleString(),

focus: document.getElementById("focus").value,

task: document.getElementById("task").value,

energy: document.getElementById("energy").value,

mood: document.getElementById("mood").value,

good: document.getElementById("good").value,

improve: document.getElementById("improve").value,

thought: document.getElementById("thought").value,

encourage: document.getElementById("encourage").value,

song: document.getElementById("song").value,

artist: document.getElementById("artist").value,

reason: document.getElementById("reason").value
};

let records = JSON.parse(localStorage.getItem("xinlingDiary")) || [];

records.push(diary);

localStorage.setItem("xinlingDiary", JSON.stringify(records));

alert("🌱 今天的心灵日记已保存！");
}

</script>

</body>
</html>
